openapi: 3.0.0
info:
  title: Navixy API Sandbox
  description: >-
    [Navixy](https://www.navixy.com/) is a GPS tracking platform developed by
    [SquareGPS](https://squaregps.com/) company.


    This is the Navixy API sandbox, where you can try different API calls, learn
    how they work, and see how they respond with real information based on your
    trackers or the demo trackers.


    All calls and methods will allow you to develop an application that pulls
    all the necessary information from the platform. By combining and processing
    the information you receive, you will be able to code a script or a program
    to cover the needs of your customers and partners by providing them with a
    customized app. A more personalized solution can attract more customers and
    increase their loyalty.


    Here you can find full API documentation:
    [https://developers.navixy.com/general/getting-started/](https://developers.navixy.com/general/getting-started/)


    At the moment, the API sandbox will be presented within the Backend APIs.
    However, we will continue to expand it with more and more API calls and
    stories that can be solved with the Navixy platform.


    The main purpose is to give you more practice with our APIs so that you can
    easily find the necessary information based on the real data from your
    trackers.


    The API sandbox will be presented in several sections, each responsible for
    its own part of the Navixy platform:


    - `User Interface API`: describes all calls for working with information
    presented to users or sub-users in the UI, including tracking, reports,
    tasks, and more.
        
    - `Panel API`: describes all calls for working with information presented to
    administrators in the admin panel, including information about devices,
    tariff plans, users, and more.
        

    You can switch between sections, which are represented as folders, and API
    calls using the menu on the left. Each section contains a description of the
    API calls listed within it.


    Additionally we will add detailed description of all parameters, response
    fields and error details. To get them click overview under the API request
    or click three dots near the section name to see all APIs and their
    descriptions:


    <img
    src="https://content.pstmn.io/652a3cbd-1aa9-44f6-af82-92b5a0e1ee99/aW1hZ2UucG5n"
    width="606" height="472">


    And choose view documentation in the dropdown:


    <img
    src="https://content.pstmn.io/773d4541-b83f-48de-b2ba-b89441f8e72e/aW1hZ2UucG5n"
    width="1443" height="895">


    To maintain the stability of the system for all users, the platform has a
    limit of 50 requests per second per user and per IP address.
  version: 1.0.0
servers:
  - url: http://{{base url}}
  - url: http://{{base url}}tracker
tags:
  - name: How to work with API Sandbox
    description: >-
      To use the Navixy API Sandbox, you'll need to sign in to your Postman
      account or create a new one for free. This is necessary for any workspace.


      Our documentation is publicly available for anyone who wants to start
      working with our APIs. That's why, if you try to send an API request
      directly from the documentation, Postman will prompt you to take an
      additional step before proceeding.


      <img
      src="https://content.pstmn.io/0c639be8-4459-409a-b7cf-d4ac1153b232/YnJvd3Nlcl90aXdCTzNQQjd6LnBuZw=="
      width="330" height="276">


      To start sending API requests, you'll need to create your own fork of our
      workspace. To do this, click the 'Create a fork' button as shown in the
      screenshot above.  

      Next, provide all the necessary information about your fork:


      - **Fork label:** This is how it will be named in your workspace.
          
      - **Workspace:** Choose the workspace to which it should be added. This is
      only necessary if you have multiple workspaces for different purposes.
          
      - **Environments:** Choose which environments should be added to your fork
      from our collection. You can select all of them or only the necessary
      ones.
          

      <img
      src="https://content.pstmn.io/89debe1a-df07-405e-aa08-65099ae2ec63/aW1hZ2UucG5n"
      width="1030" height="803">


      Finally, make sure to leave notifications enabled and click the 'Fork
      Collection' button.
  - name: How to work with API Sandbox > Managing environments
    description: >-
      After creating your fork, it will automatically open. The next step is to
      choose the necessary environment. You can find this in the upper
      right-hand corner, under your account image:


      <img
      src="https://content.pstmn.io/0e89c965-60e2-4134-a751-01efc200b272/aW1hZ2UucG5n"
      width="373" height="244">


      Alternatively, you can choose from the list of environments on the
      left-hand side. Find the necessary environment and click 'Set active'
      here.


      <img
      src="https://content.pstmn.io/d52bd615-07bf-403a-8a28-de1327006fa6/TlZJRElBX1NoYXJlX0JkTTBoRUE4ZU8ucG5n"
      width="397" height="265">


      Use our demo environment for some API calls available in demo mode, such
      as tracker list and most other read-only requests. If you want to work
      with your own trackers and their data, choose EU, US, or Your_domain. This
      is easy when you are familiar with our UI and know your panel_id, at least
      one user_id or tracker_id. If they have less than 7 digits, it is the EU
      environment. If they have 8 digits starting with 1, it is the US
      environment.


      Your data is secure, so to obtain any information about your trackers and
      users, you'll need to get a user session hash or an API key. You can get
      an API key [via the user's web
      interface](https://www.navixy.com/docs/user/web-interface-docs/user-account/api-keys/)
      or using 'User authentication' section. An API key can be used in your
      future calls within the workspace as the hash variable of an environment.
      However, we have described in detail how to use a session hash in the
      'User authentication and API keys' section.


      ### Restoring variables to default


      What if you accidentally removed the demo hash or any base URL? In this
      case, open the environment from the left menu and click the three dots on
      the right side after the necessary variable and choose 'reset.'


      <img
      src="https://content.pstmn.io/260adcbe-5270-42ce-b387-b53d6227da02/aW1hZ2UucG5n"
      width="1873" height="333">


      Now you will use the default variables.


      ### Working with variables


      This tip will save you a lot of time.


      You can create a new variable for any parameter. For example, if you need
      to create a `tracker_id` variable that will be used in your future
      requests, get the ID and add it to the environment as a new variable. Fill
      in both the initial and current value with the ID.


      <img
      src="https://content.pstmn.io/1124e5b1-299d-41bf-b7c2-04a49351b453/aW1hZ2UucG5n"
      width="1439" height="272">


      Don't forget to save the environment afterwards, or this variable won't be
      available.


      Once it is added and saved, you can use this variable in any API requests:


      <img
      src="https://content.pstmn.io/7e77bfdc-3353-4aff-979a-71ff1c6627c3/aW1hZ2UucG5n"
      width="1446" height="514">
  - name: How to work with API Sandbox > Standard workflow (example)
    description: >-
      Let's describe the standard workflow for an API developer using a very
      simple and common example: requesting the last known state data for one
      tracker.


      Choose the necessary environment you will work with.


      If it is not the Demo environment, follow the instructions on [user
      authentication](https://www.postman.com/navixyapisandbox/workspace/navixy-api-sandbox/folder/8534541-7c925681-4618-40ca-a70d-22bac7ee1131?action=share&source=copy-link&creator=8534541&ctx=documentation).


      After that, open the trackers section and locate the tracker list API
      request.


      <img
      src="https://content.pstmn.io/7c7ae2c4-49f3-4432-a10f-86a052aea218/UG9zdG1hbl9BNzdFQlZMUmtTLnBuZw=="
      width="308" height="168">


      Check all possible API parameters, response field parameters, and errors
      with the 'view documentation' option:


      <img
      src="https://content.pstmn.io/3f1d638e-d957-4f0a-ac84-f37391956fa5/aW1hZ2UucG5n"
      width="308" height="311">


      Send the request and locate the necessary `tracker_id` in the response. In
      the `tracker/list` response, this is the `id` that appears before the
      `label`.


      The next step is to locate [the last known GPS location API
      request](https://www.postman.com/navixyapisandbox/workspace/navixy-api-sandbox/request/8534541-49088d41-cf76-4d84-842a-d99785e02405?action=share&source=copy-link&creator=8534541&ctx=documentation),
      enter your `tracker_id` or variable with it into the parameter field, and
      retrieve the necessary information.
  - name: User Interface API
    description: >-
      All API calls documented in this collection are associated with the user
      account and all the entities within it. In other words, everything you can
      find in the web user interface is described below.


      Each API resource is semantically linked to a specific entity, such as
      geofences, rules, objects, and so on. The API calls for CRUD (Create,
      Read, Update, and Delete) operations, as well as other operations with
      these entities, have similar names regardless of the resource being used.
      These names include "list", "read", "create", "update", and "delete".
  - name: User Interface API > User authentication and API keys management
    description: >-
      We recommend using API keys as {{hash}} variables to gain access to all
      API calls for your user account. [You can manage API
      keys](https://www.navixy.com/docs/user/web-interface-docs/user-account/api-keys/)
      in the user web interface to simplify the process.


      Additionally, we will add user authentication as the first request if you
      want to work only in Postman. You need to specify the user's login and
      password in the parameters and send the request. If the login and password
      are correct, the platform will reply with the status "success" and a
      session hash.


      You need to highlight the hash value, right-click, and choose "Set for
      environment" and "Set as variable - Hash" in the menu.


      <img
      src="https://content.pstmn.io/cbf645bc-5459-4481-9cd7-5c64b23c875f/aW1hZ2UucG5n"
      width="700" height="382">


      Additionally, you can simply copy the hash from the reply and paste it
      into the {{hash}} variable in the environment.


      <img
      src="https://content.pstmn.io/ca91de61-76ac-4e8f-ba6a-6013cfa53444/aW1hZ2UucG5n"
      width="616" height="99">


      Additionally, you can use our demo hash to try some APIs within the demo
      account. The demo account has certain restrictions on actions. If the API
      call is not available in demo mode, the platform will notify you about it
      in the answer.


      Next, you will find API calls to obtain the user session hash and manage
      API keys on the platform. For security reasons, API keys cannot be used to
      obtain a list of API keys or for their creation and deletion. Instead,
      utilize the user session hash to manage API keys.


      A user account may have a maximum of 20 keys.


      You can find more information about API keys in our
      [documentation](https://developers.navixy.com/backend-api/resources/commons/api-keys/#list).
  - name: User Interface API > Device registration
    description: >-
      The first step for a user in their account is device registration. In this
      section, we will describe the process of registering a device on the
      platform step by step.


      It is possible to activate any GPS tracking device listed in our supported
      models list. Each model will be displayed with all integrated input types,
      available rule types, and other necessary information. To register the
      device on the platform follow several steps.


      Step 1. Check if the platform supports your device model using the
      `list_models` request. It is the first in section below. You can search
      for the necessary model in the results using Ctrl+F.


      <img
      src="https://content.pstmn.io/979d448f-2284-4398-b16a-5aa21abf548d/aW1hZ2UucG5n"
      width="468" height="192">


      Here, you can find information about the supported inputs and alerts for
      this tracker model, as well as other relevant information. Use the model
      name from the `code` into `tracker/register` request.


      Step 2. Check all plugins available for the user with the `plugin/list`
      request. The platform will reply to you with a list of plugins activated
      for your user account. To search among all plugins, simply use the search
      function in the results (Ctrl + F).


      We are interested in the following plugin IDs that are used for
      registration:


      - 44 - device registration with optional activation code.
          
      - 37 - device registration with mandatory activation code.
          
      - 35 - mobile app registration with optional activation code.
          
      - 68 - mobile app registration with mandatory activation code.
          

      Note: Do not use plugins if they are not available for your user.


      Full information about activation codes and their purposes can be found
      [here](https://www.navixy.com/docs/admin-panel-docs/plans/activation-codes/).


      Step 3. (Optional) If you want to register your device into an already
      existing group in the user account, it will make it easier to find or
      operate with devices of a particular group in future requests. Utilize the
      `group/list` request to get the group IDs. Insert the necessary group ID
      into the `tracker/register` request. If you don't need to use groups, set
      0 instead of the group ID.


      Step 4. Register the device using the `tracker/register` action with the
      appropriate plugin. For example, if you need to register a GPS tracker and
      the user has plugin 44, use that plugin.


      To find full information about every request parameter and response field,
      follow [our
      documentation](https://developers.navixy.com/backend-api/how-to/how-to-register-a-device/).
  - name: User Interface API > Trackers
    description: >-
      Here, you will find various API calls to work with trackers that are
      registered under a user account.
  - name: User Interface API > Trackers > Tracker object data
    description: >-
      These API calls are necessary to receive tracker object data. Let's
      describe the tracker object here:


      ## Tracker object structure


      ``` json

      {
        "id": 123456,
        "label": "tracker label",
        "clone": false,
        "group_id": 167,
        "avatar_file_name" : "file name",
        "source": {
          "id": 234567,
          "device_id": 9999999988888,
          "model": "telfmb920",
          "blocked": false,
          "tariff_id": 345678,
          "status_listing_id": null,
          "creation_date": "2011-09-21",
          "tariff_end_date": "2016-03-24",
          "phone": "71234567890"
        },
        "tag_bindings": [{
          "tag_id": 456789,
          "ordinal": 4
        }]
      }

       ```

      Where:


      - **id:** integer. It is the tracker_id or object_id in other requests.
          
      - **label:** string. The tracker label.
          
      - **clone:** boolean. `true` if this tracker is a
      [clone](https://docs.navixy.com/admin-panel/tracker-clones) and `false` if
      it is an original tracker.
          
      - **group_id:** integer. The tracker group ID, 0 when no group, and the
      tracker will be marked in the Main group in the user web interface.
          
      - **avatar_file_name:** optional string. The file name saved on the
      platform as an avatar of the tracker. It is passed only if present. This
      avatar is visible only in the web UI.
          
      - **source:** object. The source represents your tracker in real life. The
      source will be the same for original trackers and for clones.
          
          - **id:** integer. The source ID.
              
          - **device_id:** string. The device id or IMEI. The information you used to register a tracker.
              
          - **model:** string. The tracker model name from the model list API call.
              
          - **blocked:** boolean. `true` if tracker is blocked due to the tariff end. Most of the actions won't be available for blocked trackers. To unblock it, the user account must have enough balance to charge according to a tracker's tariff plan.
              
          - **tariff_id:** integer. An ID of a tracker plan from the admin panel. You can check the plan details within the admin panel or using panel APIs.
              
          - **status_listing_id:** int. An ID of the status listing associated with this tracker, or null.
              
          - **creation_date:** [date/time](https://developers.navixy.com/backend-api/getting-started/#data-types). A date when a tracker was registered on the platform.
              
          - **tariff_end_date:** [date/time](https://developers.navixy.com/backend-api/getting-started/#data-types). A date of the next tariff prolongation, or null.
              
          - **phone:** string. Phone of the device. Can be null or empty if a device has no GSM module.
              
      - **tag_binding:** object. List of attached tags. Appears only for the
      [tracker/list](https://developers.navixy.com/backend-api/resources/tracking/tracker/#list)
      call.
          
          - **tag_id:** integer. An ID of a tag.
              
          - **ordinal:** integer. The number that can be used as ordinal or kind of tag. The max value is 5.
              

      The next API calls we added to this section:


      -
      [tracker/read](https://navixyapisandbox.postman.co/workspace/Navixy-API-Sandbox~88daa7aa-f426-4ac1-be59-10bb3877bd1b/request/8534541-e08d1e72-272c-4b93-9368-9350b286c360?action=share&source=copy-link&creator=8534541&ctx=documentation)
      - will provide you with tracker object information for a specific tracker.
          
      -
      [tracker/list](https://navixyapisandbox.postman.co/workspace/Navixy-API-Sandbox~88daa7aa-f426-4ac1-be59-10bb3877bd1b/request/8534541-96d2c4c8-517f-46e1-9fa0-79f2bc499716?action=share&source=copy-link&creator=8534541&ctx=documentation)
      - will provide you with tracker object information from all objects
      registered under the user account.
  - name: User Interface API > Trackers > Last location and state info
    description: >-
      This section will present API calls to get the last location and status
      information of your trackers which may be used in different dashboards
      representing the current object location related information.


      - `tracker/get_last_gps_point` - will provide you with only the
      information about the last GPS data received by the platform from a
      tracker. If your device provides data from its buffer (history), this API
      call will give you the most relevant GPS point received.
          
      - `tracker/get_state` - will provide you with the last received location
      and status information of a specific tracker. Here, you can get movement
      status, last GPS and GSM update, last speed, altitude and heading, outputs
      and inputs status, current connection status, and so on.
          
      - `tracker/get_states` - will provide you with all the same as `get_state`
      request, but for all listed `tracker_ids` in the trackers parameter.
  - name: User Interface API > Trackers > Counters
    description: >-
      There are two types of counters:


      - Odometer - the odometer allows you to monitor a vehicle's mileage in
      real-time. The mileage readings can be based on the data received from a
      GPS tracking device or CAN bus.  
          Usually odometer counter can be used to pay drivers or charge shared objects for covered distance.
          
      - Engine hours - this counter allows owners of vehicles and special
      machinery to monitor the engine's running time and schedule maintenance
      work based on this data.
          

      The platform will begin counting the information after you create a new
      counter.
  - name: User Interface API > Trackers > Counters > Create counter
    description: >-
      Let's start with counter creation.


      To create an odometer counter, you need to use the `tracker/list` API call
      to get the `tracker_ids` from its response and choose one of the counter
      types.


      For the counter, you can set a specific mileage measurement sensor. The
      counter will add the delta between the last received value and the new one
      to the counter value. So, the counter doesn't read the value itself; it
      just takes the delta. For example, if the last mileage reading was 100 km,
      and the new one is 120 km, the counter will add 20 km to its last value,
      not just show 120 km.


      Engine hours can have only CAN:Engine hours sensor as a source.


      The counter creation process consists of two API calls:


      1. Step 1. Use the `counter/value/set` API call to set up the counter
      initially or update values for the existing one. Here, you need to use the
      `tracker_id` and one of types: `odometer` or `engine_hours`. Additionally,
      you need to add the starting value. The counter will add the counted delta
      of the source to this value.
          
      2. Step 2. Use the `counter/update` API call to set additional counter
      parameters like multiplier, and `source_sensor_id`.
          
          1. If `source_id` is `null` for the odometer - it will count mileage based on GPS provided by a tracker.
              
          2. If `source_id` is `null` for engine hours - it will count engine hours from the ignition source.
  - name: User Interface API > Trackers > Counters > Reading counters data
    description: >-
      Once the odometer and engine hours are created, they can be received as
      values in your apps and dashboards.


      Odometer readings are updated no more frequently than once every three
      minutes, and the engine hours counter readings are updated every three
      hours.


      There are several ways to receive values:


      - To receive the last values from both the odometer and engine hours, you
      can use the `counter/get_counters` request.
          
      - In case you need the last information of a particular counter on one
      tracker, you can use the `counter/value/get request`.
          
      - In case you need the last information of a particular counter on a list
      of trackers, utilize the `counter/value/list` call.
          
      - If you create a report about odometer or engine hours values with
      timestamps, the `counters/data/list` request will be helpful for you.
          
      - Additionally, if you need counted information per some period, which is
      useful for reports as total or dashboards with timespan, use the
      `stats/mileage` or `stats/engine_hours` requests.
  - name: User Interface API > Trackers > Sensors
    description: >-
      The ability to connect sensors, as well as their number, may vary
      depending on the device model. Some sensors are automatically created by
      the platform. The list of these sensors depends on the device model and
      the information received from them. Some sensors, such as the board
      voltage, will be added automatically during the registration process, but
      most of other sensors should be created manually.


      Full sensor creation has several steps:


      1. Data sending from the sensor should be configured on the device's side,
      and it should be received by the platform. To check which sensor is
      received by the platform, we recommend using [the air console in the admin
      panel](https://docs.navixy.com/admin-panel/air-console) in the admin panel
      as the fastest way with a GUI.  
          It is also possible to connect via [websockets to console](https://developers.navixy.com/panel-api/resources/tracker/#consoleconnect), but it requires additional websocket configuration on your side.
          
      2. After checking the air console, we know which sensor sends data to the
      platform (the right console part) and can choose one of them to
      [create](https://developers.navixy.com/backend-api/resources/tracking/tracker/sensor/#create).
          
      3. The sensor should be additionally
      [calibrated](https://developers.navixy.com/backend-api/resources/tracking/tracker/sensor/calibration_data/)
      in case it sends data in an uncalibrated form. For example, analog
      temperature or LLS fuel level sensors.
          

      There are several different sensor sub-types:


      - Metering sensors - are sensors that may provide valuable readings, such
      as temperature, mileage, and fuel level. They can also be aggregation
      (composite) sensors that sum or average readings from sensors of the same
      type.
          
      - Discrete inputs - are digital inputs which can get on/off states from
      wires.
          
      - Virtual sensor - the additional sensor which can get information from
      real sensors, but you're able to define your values for the standard
      readings. For example, if it gets data from a fuel level sensor, you can
      set the values - "need to refill" or "enough fuel".
          

      We will describe them all further and provide examples for creating and
      updating them.
  - name: User Interface API > Trackers > Sensors > Creating sensors
    description: Here you will learn how to create and update different types of sensors.
  - name: >-
      User Interface API > Trackers > Sensors > Creating sensors > Metering
      sensors
    description: >-
      Metering sensors are sensors that may provide valuable readings, such as
      temperature, mileage, fuel level, and so on. The metering sensor has the
      following object structure:


      ``` json

      {
          "type": "metering",
          "id": 860250,
          "sensor_type": "temperature",
          "name": "OBD Coolant temperature",
          "input_name": "obd_coolant_t",
          "multiplier": 1.0,
          "divider": 1.0,
          "accuracy": 0.0,
          "units": "",
          "units_type": "celsius",
          "parameters": {
            "parent_ids": [123042, 123566],
            "volume": 0.7,
            "min": 0.0,
            "max": 12.0,
            "max_lowering_by_time": 120.0,
            "max_lowering_by_mileage": 120.0,
            "ignore_drains_in_move": true,
            "ignore_refuels_in_move": false,
            "refuel_gap_minutes": 11
          }
      }

       ```

      Field definitions:


      - `type` - string. Always `metering` for metering sensors.
          
      - `id` - integer. A sensor id.
          
      - `sensor_type` - string. Type of a metering sensor. Listed below.
          
      - `name` - string. A name of a sensor.
          
      - `input_name` - string. The input name. Don't mix it up with the
      `sensor_type`. The `input_name` is where the platform receives the
      readings. You can see `input_names` on the right part of the Air console.
      Also, you can get the list of all supported `input_types` by the platform
      [here](https://developers.navixy.com/backend-api/resources/tracking/tracker/sensor/input_name/#response).  
          Should be `composite` for aggregation sensors. Will be described additionally.
          
      - `divider` - double. Divider is used to divide the incoming values from
      the sensor. For example, if your sensor sends 120, and with a divider of
      10, the platform will save 12 into the sensor's data.
          
      - `accuracy` - integer. The sensor's accuracy in percentages. It is used
      for the fuel sensor type only. For others, you may set 0. It is necessary
      to count the possible absolute error to define refills or drains of fuel.
      We have described it in detail in the [Eco Fleet docs
      section](https://docs.navixy.com/eco-fleet/sensors-setup-and-configuration).
      The minimum=0.0, maximum=100.0 with a step of 0.25.
          
      - `units` - string. What units should be shown on the platform. Should be
      used with `units_type` `custom` only. For other types, it should be empty.
          
      - `units_type` - string. Units type. May be `custom` for all
      `sensor_type`. Other available unit types are listed below.
          
      - `parameters` - object. Optional object with additional parameters.
          
          - `parent_ids` - optional array of parent_ids for `composite` `input_type`.
              
          - `volume` - double. Max volume of a composite sensor, applicable for `composite` `input_type` only.
              
          - `min` - double. The platform will ignore raw data from this sensor less than this value.
              
          - `max` - double. The platform will ignore raw data from this sensor more than this value.
              
          - `max_lowering_by_time` - integer. The maximum allowable flow rate is measured in units per hour. When calculating the fuel change speed over time, the platform compares the fuel level change between points. If it is not set, the default value is 120 units per hour. It means the fuel level should change faster than 120 per hour (equal to 20 L per 10 minutes or 2 L per minute) to determine the drain in a report. This value should be set a few percentage points higher than the likely consumption rate during heavy loads or when the vehicle is ascending uphill. Parameter is applicable for `sensor_type` `fuel` only.
              
          - `max_lowering_by_mileage` - integer. The maximum allowable fuel level change speed is measured in units per 100 km. For example, if we set 100 L per 100 km, it means the fuel level should change faster than 100 L per 100 km (equal to 10 L per 10 km or 1 L per km) to determine the drain in a report. We recommend conducting tests and verifying the actual fuel consumption rate recorded in the reports, then set the necessary values accordingly for maximum accuracy. Parameter is applicable for `sensor_type` `fuel` only.
              
          - `ignore_drains_in_move` - boolean. Drains in movement will be excluded. Parameter is applicable for `sensor_type` `fuel` only.
              
          - `ignore_refuels_in_move` - boolean. Refills in movement will be filtered. Parameter is applicable for `sensor_type` `fuel` only.
              
          - `refuel_gap_minutes` - integer. This setting is required when the Ignore feature is enabled. It determines the timeout period in minutes that will be used to shorten the driving intervals for fuel filtering. This option can be helpful if the fuel level stabilizes only after some time has passed since refueling, and the vehicle has already started moving. This is more commonly seen in vehicles with large fuel tanks. The default setting for this feature is 5 minutes. Parameter is applicable for `sensor_type` `fuel` only.
              

      Metering sensor types with available for them `units_type`:


      - `fuel`
          
          - `litres`
              
          - `gallon_imp` - gallon (UK).
              
          - `gallon_us` - gallon (US).
              
          - `percent`
              
          - `custom`
              
      - `temperature`
          
          - `celsius`
              
          - `fahrenheit`
              
